version: "3.8"

services:
  # Redis Cache & Message Broker (lightweight)
  redis:
    image: redis:7-alpine
    container_name: youtube_audit_redis_minimal
    restart: unless-stopped
    command: redis-server --appendonly no --save ""
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Flask Backend API
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: youtube_audit_backend_minimal
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
      - ./uploads:/app/uploads
      - ./data:/app/data
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=sqlite:////app/data/youtube_audit.db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    depends_on:
      redis:
        condition: service_healthy

  # Celery Worker for Background Tasks
  celery_worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: youtube_audit_celery_minimal
    restart: unless-stopped
    command: celery -A backend.celery_app worker --loglevel=info --concurrency=1
    volumes:
      - ./backend:/app/backend
      - ./uploads:/app/uploads
      - ./data:/app/data
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=sqlite:////app/data/youtube_audit.db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    depends_on:
      redis:
        condition: service_healthy

  # Streamlit Frontend
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: youtube_audit_frontend_minimal
    restart: unless-stopped
    ports:
      - "8501:8501"
    volumes:
      - ./frontend:/app
    env_file:
      - .env
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_HEADLESS=true
      - API_URL=http://backend:8000
    depends_on:
      - backend

# Network Configuration
networks:
  default:
    driver: bridge
