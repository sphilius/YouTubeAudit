version: "3.8"
services:
  web:
    build:
      context: .
      dockerfile: ./Dockerfile
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - redis
      - worker
      - beat

  worker:
    build:
      context: .
      dockerfile: ./Dockerfile
    command: celery -A backend.tasks worker --loglevel=info
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - redis

  beat:
    build:
      context: .
      dockerfile: ./Dockerfile
    command: celery -A backend.tasks beat --loglevel=info
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  flower:
    build:
      context: .
      dockerfile: ./Dockerfile
    command: celery -A backend.tasks flower --port=5555
    ports:
      - "5555:5555"
    env_file:
      - .env
    depends_on:
      - redis

networks:
  default:
    driver: bridge
